<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Online Quiz System</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .welcome-card {
            background: linear-gradient(135deg, var(--accent-color), var(--info-color));
            color: white;
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .welcome-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-icon {
            font-size: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-light);
            color: var(--accent-color);
        }
        .stat-info h3 {
            font-size: 1.5rem;
            margin-bottom: 0.2rem;
        }
        .stat-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .search-bar {
            position: relative;
            max-width: 300px;
            width: 100%;
        }
        .search-bar input {
            padding-left: 2.5rem;
        }
        .search-bar i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .quiz-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .quiz-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            transition: all 0.2s ease;
        }
        .quiz-item:hover {
            border-color: var(--accent-color);
        }
        .quiz-info h4 {
            margin-bottom: 0.25rem;
        }
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .activity-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
        }
        .activity-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            flex-shrink: 0;
        }
        .activity-details p {
            margin-bottom: 0.2rem;
            font-size: 0.95rem;
        }
        .activity-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="dashboard.html" class="nav-logo">
                <i class="fas fa-graduation-cap"></i> QuizPro
            </a>
            
            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            
            <div class="nav-links">
                <a href="dashboard.html" class="active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="history.html"><i class="fas fa-history"></i> History</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content container">
        
        <!-- Welcome Card -->
        <div class="welcome-card">
            <h2 id="welcome-message">Welcome back, User!</h2>
            <p>Ready to test your knowledge today? Choose a topic and start your quiz.</p>
            <div class="mt-3">
                <a href="quiz.html" class="btn btn-outline" style="background: white; color: var(--accent-color); border: none;">
                    <i class="fas fa-play"></i> Quick Start
                </a>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="glass-panel stat-card">
                <div class="stat-icon"><i class="fas fa-clipboard-list"></i></div>
                <div class="stat-info">
                    <h3 id="stat-total-quizzes">0</h3>
                    <p>Total Quizzes</p>
                </div>
            </div>
            <div class="glass-panel stat-card">
                <div class="stat-icon" style="color: var(--success-color); background: rgba(16, 185, 129, 0.1);"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info">
                    <h3 id="stat-completed">0</h3>
                    <p>Completed</p>
                </div>
            </div>
            <div class="glass-panel stat-card">
                <div class="stat-icon" style="color: var(--warning-color); background: rgba(245, 158, 11, 0.1);"><i class="fas fa-chart-pie"></i></div>
                <div class="stat-info">
                    <h3 id="stat-avg-score">0%</h3>
                    <p>Average Score</p>
                </div>
            </div>
            <div class="glass-panel stat-card">
                <div class="stat-icon" style="color: var(--info-color); background: rgba(59, 130, 246, 0.1);"><i class="fas fa-trophy"></i></div>
                <div class="stat-info">
                    <h3 id="stat-best-score">0%</h3>
                    <p>Best Score</p>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Available Quizzes -->
            <div class="glass-panel p-4" style="padding: 1.5rem;">
                <div class="section-header">
                    <h3>Available Quizzes</h3>
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="quiz-search" class="form-control" placeholder="Search topics...">
                    </div>
                </div>
                
                <div class="quiz-list" id="quiz-list">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="glass-panel p-4" style="padding: 1.5rem;">
                <div class="section-header">
                    <h3>Recent Activity</h3>
                </div>
                <div class="activity-list" id="activity-list">
                    <!-- Populated by JS -->
                    <div class="text-center text-muted p-4">No recent activity</div>
                </div>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="../js/theme.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/questions.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
