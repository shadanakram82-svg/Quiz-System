<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Online Quiz System</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }
        .history-table th, .history-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }
        .history-table th {
            font-weight: 600;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.02);
        }
        .history-table tr:last-child td {
            border-bottom: none;
        }
        .history-table tr:hover {
            background: rgba(0,0,0,0.01);
        }
        [data-theme="dark"] .history-table tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .badge-pass { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
        .badge-fail { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
        
        .history-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        @media (max-width: 768px) {
            .history-table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="dashboard.html" class="nav-logo">
                <i class="fas fa-graduation-cap"></i> QuizPro
            </a>
            
            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            
            <div class="nav-links">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="history.html" class="active"><i class="fas fa-history"></i> History</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content container">
        
        <div class="glass-panel" style="padding: 2rem;">
            <div class="history-controls">
                <h2>Quiz History</h2>
                <div class="flex gap-2">
                    <button class="btn btn-outline" id="btn-export">
                        <i class="fas fa-download"></i> Export CSV
                    </button>
                    <button class="btn btn-outline" style="color: var(--danger-color); border-color: var(--danger-color);" id="btn-clear">
                        <i class="fas fa-trash"></i> Clear All
                    </button>
                </div>
            </div>

            <div id="history-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Topic</th>
                            <th>Score</th>
                            <th>Percentage</th>
                            <th>Status</th>
                            <th>Time Taken</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="../js/theme.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/csv.js"></script>
    <script src="../js/history.js"></script>
</body>
</html>
