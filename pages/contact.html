<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Online Quiz System</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="dashboard.html" class="nav-logo">
                <i class="fas fa-graduation-cap"></i> QuizPro
            </a>
            
            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            
            <div class="nav-links">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
                <a href="contact.html" class="active"><i class="fas fa-envelope"></i> Contact</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content container">
        
        <div class="glass-panel" style="padding: 3rem; max-width: 600px; margin: 0 auto;">
            <h2 class="mb-4 text-center">Contact Us</h2>
            
            <form id="contact-form" novalidate>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <i class="fas fa-user form-icon"></i>
                    <input type="text" id="contact-name" class="form-control" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <i class="fas fa-envelope form-icon"></i>
                    <input type="email" id="contact-email" class="form-control" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Message</label>
                    <i class="fas fa-comment-alt form-icon" style="top: 2.3rem;"></i>
                    <textarea id="contact-msg" class="form-control" rows="5" placeholder="How can we help you?" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-full mt-2" id="submit-btn">
                    Send Message <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>

    </main>

    <!-- Scripts -->
    <script src="../js/theme.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/validation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contact-form');
            const nameInput = document.getElementById('contact-name');
            const emailInput = document.getElementById('contact-email');
            const msgInput = document.getElementById('contact-msg');
            const btn = document.getElementById('submit-btn');

            if (form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    Validation.clearAllErrors(form);
                    let isValid = true;

                    if (!nameInput.value.trim()) {
                        Validation.showError(nameInput, 'Name is required');
                        isValid = false;
                    }
                    if (!emailInput.value.trim() || !Validation.isEmail(emailInput.value.trim())) {
                        Validation.showError(emailInput, 'Valid email is required');
                        isValid = false;
                    }
                    if (!msgInput.value.trim()) {
                        Validation.showError(msgInput, 'Message is required');
                        isValid = false;
                    }

                    if (isValid) {
                        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                        btn.disabled = true;

                        setTimeout(() => {
                            App.showToast("Message sent successfully!", "success");
                            form.reset();
                            btn.innerHTML = 'Send Message <i class="fas fa-paper-plane"></i>';
                            btn.disabled = false;
                        }, 1500);
                    }
                });
            }
        });
    </script>
</body>
</html>
