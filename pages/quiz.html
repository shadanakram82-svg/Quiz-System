<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Online Quiz System</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .quiz-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 0;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .timer {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--danger-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--card-border);
        }
        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: var(--input-bg);
            border-radius: 5px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-card {
            padding: 2rem;
            margin-bottom: 1.5rem;
            min-height: 350px;
            display: flex;
            flex-direction: column;
        }
        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
            flex: 1;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--input-bg);
        }
        .option-label:hover {
            border-color: var(--accent-color);
            background: var(--accent-light);
        }
        .option-label input {
            display: none;
        }
        .option-label.selected {
            border-color: var(--accent-color);
            background: var(--accent-light);
            box-shadow: 0 0 0 1px var(--accent-color);
        }
        .option-text {
            margin-left: 1rem;
            font-size: 1.1rem;
        }
        .option-letter {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .quiz-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .nav-buttons {
            display: flex;
            gap: 1rem;
        }
        .quiz-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 1.5rem;
            align-items: flex-start;
        }
        .navigator-container {
            padding: 1.5rem;
        }
        .question-nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .nav-dot {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            transition: all 0.2s;
        }
        .nav-dot:hover {
            border-color: var(--accent-color);
        }
        .nav-dot.answered {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }
        .nav-dot.review {
            background: var(--warning-color);
            color: white;
            border-color: var(--warning-color);
        }
        .nav-dot.current {
            border: 2px solid var(--accent-color);
            transform: scale(1.1);
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            max-width: 400px;
            width: 90%;
            padding: 2rem;
            text-align: center;
            transform: translateY(20px);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        @media (max-width: 992px) {
            .quiz-layout {
                grid-template-columns: 1fr;
            }
            .question-nav-grid {
                grid-template-columns: repeat(10, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .question-nav-grid {
                grid-template-columns: repeat(5, 1fr) !important;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="dashboard.html" class="nav-logo">
                <i class="fas fa-graduation-cap"></i> QuizPro
            </a>
            <div class="nav-links">
                <span class="text-secondary" id="topic-display">Topic: Mixed</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content container">
        
        <div class="quiz-container">
            
            <div class="quiz-header">
                <div>
                    <h2 class="mb-1" id="question-counter">Question 1 of 10</h2>
                    <p class="text-muted text-sm">Read the question carefully before answering.</p>
                </div>
                <div class="timer" id="timer">
                    <i class="fas fa-clock"></i> <span>10:00</span>
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="quiz-layout">
                <div class="quiz-main">
                    <!-- Question Card -->
                    <div class="glass-panel question-card">
                        <div class="question-text" id="question-text">
                            Loading question...
                        </div>
                        
                        <div class="options-grid" id="options-grid">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <div class="quiz-footer">
                        <button class="btn btn-outline" id="btn-review">
                            <i class="fas fa-flag"></i> Mark for Review
                        </button>

                        <div class="nav-buttons">
                            <button class="btn btn-outline" id="btn-prev" disabled>Previous</button>
                            <button class="btn btn-primary" id="btn-next">Next</button>
                        </div>
                    </div>
                </div>

                <div class="quiz-sidebar">
                    <!-- Navigator -->
                    <div class="glass-panel navigator-container">
                        <h4 class="mb-2">Question Navigator</h4>
                        <div class="flex gap-3 mb-2 text-sm text-muted" style="flex-wrap: wrap;">
                            <span class="flex items-center gap-1"><span style="width:12px;height:12px;background:var(--success-color);border-radius:2px;"></span> Answered</span>
                            <span class="flex items-center gap-1"><span style="width:12px;height:12px;background:var(--warning-color);border-radius:2px;"></span> Review</span>
                            <span class="flex items-center gap-1"><span style="width:12px;height:12px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:2px;"></span> Unanswered</span>
                        </div>
                        <div class="question-nav-grid" id="question-nav">
                            <!-- Populated by JS -->
                        </div>
                        <div class="mt-4 flex justify-center">
                            <button class="btn btn-primary w-full" style="background:var(--success-color);" id="btn-submit">
                                Submit Quiz <i class="fas fa-check"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <!-- Submit Modal -->
    <div class="modal-overlay" id="submit-modal">
        <div class="glass-panel modal-content">
            <h2 class="mb-2">Submit Quiz?</h2>
            <p class="text-muted mb-4">Are you sure you want to submit? You have <span id="unanswered-count">0</span> unanswered questions.</p>
            <div class="flex gap-2 justify-center">
                <button class="btn btn-outline" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" style="background:var(--success-color);" id="modal-confirm">Confirm Submit</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/theme.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/questions.js"></script>
    <script src="../js/quiz.js"></script>
</body>
</html>
